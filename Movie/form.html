<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영화 후기 작성</title>
</head>
<body>
    <h1>영화 후기 작성하기</h1>

    <form action="#" method="post">
        
        <p>
            <label for="movie-selection">후기를 남길 영화를 선택하세요:</label>
            <select id="movie-selection" name="movie">
                <option value="humanint">휴민트</option>
                <option value="conjuring">컨저링</option>
            </select>
        </p>

        <p>
            <label for="user-name">작성자 성함:</label>
            <input type="text" id="user-name" name="username" placeholder="이름을 입력해 주세요">
        </p>

        <hr>

        <div>
            <h3>[휴민트] 관람평</h3>
            <label for="review-humanint">첩보 액션은 어떠셨나요?</label><br>
            <textarea id="review-humanint" name="review1" rows="4" cols="50" placeholder="휴민트에 대한 후기를 남겨주세요."></textarea>
        </div>

        <br>

        <div>
            <h3>[컨저링] 관람평</h3>
            <label for="review-conjuring">공포감은 만족스러우셨나요?</label><br>
            <textarea id="review-conjuring" name="review2" rows="4" cols="50" placeholder="컨저링에 대한 후기를 남겨주세요."></textarea>
        </div>

        <br>

        <p>
            <button type="submit">후기 등록 완료</button>
        </p>
    </form>

    <hr>

    <p>
        <a href="../index.html">메인으로 돌아가기</a>
    </p>
</body>
</html>
