<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKY FORCE 1945</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00ffff;
    --neon-red: #ff2244;
    --neon-yellow: #ffdd00;
    --neon-green: #00ff88;
    --neon-orange: #ff8800;
    --bg-dark: #020408;
    --bg-deep: #050a10;
    --panel-bg: rgba(0, 20, 40, 0.9);
    --glow-cyan: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
    --glow-red: 0 0 10px #ff2244, 0 0 20px #ff2244;
    --glow-yellow: 0 0 10px #ffdd00, 0 0 20px #ffdd00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #hud {
    width: 480px;
    background: var(--panel-bg);
    border: 1px solid var(--neon-cyan);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 30px rgba(0,20,40,0.8);
    position: relative;
    z-index: 10;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .hud-label {
    font-size: 6px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .hud-value {
    font-size: 11px;
    color: white;
    text-shadow: var(--glow-cyan);
  }

  #scoreVal { color: var(--neon-yellow); text-shadow: var(--glow-yellow); }
  #livesVal { color: var(--neon-red); text-shadow: var(--glow-red); }
  #stageVal { color: var(--neon-green); text-shadow: 0 0 10px #00ff88; }

  #healthBar {
    width: 80px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 2px;
    overflow: hidden;
  }

  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #ff2244, #ff8800, #00ff88);
    transition: width 0.2s;
    border-radius: 2px;
    box-shadow: 0 0 8px #00ff88;
  }

  canvas {
    display: block;
    border-left: 1px solid var(--neon-cyan);
    border-right: 1px solid var(--neon-cyan);
    box-shadow: 
      0 0 30px rgba(0,255,255,0.15),
      -2px 0 15px rgba(0,255,255,0.1),
      2px 0 15px rgba(0,255,255,0.1);
    background: #020408;
  }

  #bottomBar {
    width: 480px;
    background: var(--panel-bg);
    border: 1px solid var(--neon-cyan);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 6px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.3);
  }

  .controls-hint {
    font-size: 5px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 1px;
  }

  #bombCount {
    font-size: 9px;
    color: var(--neon-orange);
    text-shadow: 0 0 10px #ff8800;
  }

  /* Overlay screens */
  #overlay {
    position: absolute;
    top: 40px;
    left: 0;
    width: 480px;
    height: 640px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(2,4,8,0.92);
    z-index: 100;
    gap: 20px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.3;
  }

  .overlay-sub {
    font-size: 7px;
    color: var(--neon-yellow);
    text-shadow: var(--glow-yellow);
    letter-spacing: 2px;
    text-align: center;
  }

  .overlay-score {
    font-size: 12px;
    color: white;
    text-shadow: var(--glow-cyan);
    text-align: center;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 28px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: var(--glow-cyan);
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.05);
    transition: all 0.2s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0,255,255,0.1);
    transform: scale(1.05);
  }

  .btn-red {
    border-color: var(--neon-red);
    color: var(--neon-red);
    text-shadow: var(--glow-red);
    box-shadow: 0 0 15px rgba(255,34,68,0.3), inset 0 0 15px rgba(255,34,68,0.05);
  }
  .btn-red:hover {
    background: rgba(255,34,68,0.1);
    box-shadow: var(--glow-red), inset 0 0 20px rgba(255,34,68,0.1);
  }

  .blink {
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .scanline {
    position: absolute;
    top: 40px;
    left: 0;
    width: 480px;
    height: 640px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  .logo-line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  #highScoreVal {
    font-size: 10px;
    color: var(--neon-green);
    text-shadow: 0 0 10px #00ff88;
  }

  .power-icons {
    display: flex;
    gap: 8px;
    font-size: 6px;
    color: rgba(0,255,255,0.6);
    letter-spacing: 1px;
  }

  #mobileControls { display: none; }

  /* Pause overlay */
  #pauseOverlay {
    position: absolute; top: 40px; left: 0;
    width: 480px; height: 640px;
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(2,4,8,0.88); z-index: 200; gap: 22px;
  }
  #pauseOverlay.active { display: flex; }

  .pause-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px; font-weight: 900;
    color: var(--neon-cyan); text-shadow: var(--glow-cyan); letter-spacing: 6px;
  }
  .pause-btns { display: flex; flex-direction: column; gap: 14px; align-items: center; }

  .btn-sm {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; padding: 11px 24px; background: transparent;
    border: 2px solid var(--neon-cyan); color: var(--neon-cyan); cursor: pointer;
    letter-spacing: 2px; text-shadow: var(--glow-cyan);
    box-shadow: 0 0 12px rgba(0,255,255,0.25);
    transition: all 0.2s; border-radius: 2px; text-transform: uppercase;
  }
  .btn-sm:hover { background: rgba(0,255,255,0.1); box-shadow: var(--glow-cyan); transform: scale(1.05); }
  .btn-sm.red { border-color: var(--neon-red); color: var(--neon-red); text-shadow: var(--glow-red); box-shadow: 0 0 12px rgba(255,34,68,0.25); }
  .btn-sm.red:hover { background: rgba(255,34,68,0.1); box-shadow: var(--glow-red); }

  /* 랭킹 모달 */
  #rankingModal {
    position: absolute; top: 40px; left: 0;
    width: 480px; height: 640px;
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(2,4,8,0.95); z-index: 300; gap: 16px;
  }
  #rankingModal.active { display: flex; }

  .ranking-title {
    font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
    color: var(--neon-yellow); text-shadow: var(--glow-yellow); letter-spacing: 4px;
  }
  .ranking-sep { width: 320px; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-yellow), transparent); }
  .ranking-table { width: 340px; border-collapse: collapse; }
  .ranking-table tr { border-bottom: 1px solid rgba(0,255,255,0.12); }
  .ranking-table td { padding: 11px 8px; font-size: 9px; color: white; letter-spacing: 1px; }
  .ranking-table td:first-child { width: 44px; text-align: center; }
  .ranking-table td:last-child  { text-align: right; color: var(--neon-yellow); }
  .r1 td { color: #ffd700 !important; font-size: 10px; }
  .r2 td:first-child { color: #c0c0c0 !important; }
  .r3 td:first-child { color: #cd7f32 !important; }
  .r-empty td { color: rgba(255,255,255,0.2) !important; }

  /* HUD 버튼 그룹 */
  #hudBtns { display: flex; gap: 6px; }
  .hud-btn {
    font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 4px 7px;
    background: transparent; border: 1px solid rgba(0,255,255,0.35);
    color: rgba(0,255,255,0.65); cursor: pointer; border-radius: 2px;
    transition: all 0.18s; letter-spacing: 1px;
  }
  .hud-btn:hover { background: rgba(0,255,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }

  @media (max-width: 520px) { #gameWrapper { transform: scale(0.85); transform-origin: top center; } }
</style>
</head>
<body>

<div id="gameWrapper">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreVal">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-value" id="highScoreVal">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">SHIELD</span>
      <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span class="hud-value" id="livesVal">✈ ✈ ✈</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">STAGE</span>
      <span class="hud-value" id="stageVal">01</span>
    </div>
    <div id="hudBtns">
      <button class="hud-btn" id="pauseBtn" title="P키">⏸</button>
      <button class="hud-btn" id="rankBtn" title="랭킹">🏆</button>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="gameCanvas" width="480" height="640"></canvas>

  <!-- Scanline overlay -->
  <div class="scanline"></div>

  <!-- Pause Overlay -->
  <div id="pauseOverlay">
    <div class="pause-title">PAUSED</div>
    <div class="logo-line"></div>
    <div class="pause-btns">
      <button class="btn-sm" id="resumeBtn">▶ RESUME</button>
      <button class="btn-sm" id="restartBtn">↺ RESTART</button>
      <button class="btn-sm red" id="mainMenuBtn">⌂ MAIN MENU</button>
    </div>
    <div style="font-size:6px;color:rgba(0,255,255,0.4);letter-spacing:1px;margin-top:8px">P KEY TO RESUME</div>
  </div>

  <!-- Ranking Modal -->
  <div id="rankingModal">
    <div class="ranking-title">🏆 TOP 5 RANKING</div>
    <div class="ranking-sep"></div>
    <table class="ranking-table" id="rankingTable"></table>
    <div class="ranking-sep"></div>
    <button class="btn-sm" id="rankCloseBtn">CLOSE</button>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <div class="logo-line"></div>
    <div class="overlay-title">SKY FORCE<br>1945</div>
    <div class="logo-line"></div>
    <div class="overlay-sub blink">▶ PRESS SPACE OR CLICK TO START ◀</div>
    <div class="overlay-score">
      <span style="font-size:7px;color:rgba(255,255,255,0.5)">HI-SCORE: </span>
      <span id="overlayHi">000000</span>
    </div>
    <div class="power-icons">
      ◆ SPEED UP &nbsp; ★ POWER UP &nbsp; ♦ BOMB &nbsp; ✦ SHIELD
    </div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <!-- Bottom bar -->
  <div id="bottomBar">
    <span class="controls-hint">← → ↑ ↓ MOVE &nbsp;|&nbsp; Z / SPACE SHOOT &nbsp;|&nbsp; X BOMB</span>
    <span id="bombCount">💣 3</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// roundRect 폴리필 (구버전 브라우저 대비)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h); this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r); this.arcTo(x,y,x+r,y,r);
    this.closePath();
    return this;
  };
}

const W = canvas.width;
const H = canvas.height;

// ─── Game State ───────────────────────────────────────────────
let state = 'menu'; // menu | playing | paused | gameover | stageclear
let score = 0;
let hiScore = parseInt(localStorage.getItem('sf1945_hi') || '0');
let rankings = JSON.parse(localStorage.getItem('sf1945_rankings') || '[]'); // [{score, stage, date}]
let lives = 3;
let stage = 1;
let bombs = 3;
let frameCount = 0;
let bossActive = false;
let stageEnemyCount = 0;
let stageKillCount = 0;

// ─── Keys ────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'playing') {
    if (e.code === 'KeyX' || e.code === 'KeyB') useBomb();
  }
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'menu') startGame();
  if ((e.code === 'Escape' || e.code === 'KeyP') && (state === 'playing' || state === 'paused')) {
    if (document.getElementById('rankingModal').classList.contains('active')) { hideRanking(); }
    else togglePause();
  }
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'gameover') { state='menu'; showOverlay('menu'); }
  if (e.code === 'Space' && state === 'stageclear') nextStage();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Entities ─────────────────────────────────────────────────
let player = null, bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [], boss = null;

// ─── Stars ───────────────────────────────────────────────────
const stars = [];
function initStars() {
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random()
    });
  }
}

// ─── Player ──────────────────────────────────────────────────
function createPlayer() {
  return {
    x: W / 2, y: H - 80,
    w: 36, h: 36,
    speed: 5,
    hp: 100, maxHp: 100,
    fireRate: 8,
    fireCooldown: 0,
    power: 1, // 1-5
    invincible: 0,
    trail: [],
    bombBlast: 0,
  };
}

// ─── Draw Player ─────────────────────────────────────────────
function drawPlayer(p) {
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) return;

  const x = p.x, y = p.y;

  // Engine glow
  ctx.save();
  const eg = ctx.createRadialGradient(x, y+22, 0, x, y+22, 18);
  eg.addColorStop(0, 'rgba(0,180,255,0.6)');
  eg.addColorStop(1, 'rgba(0,60,180,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.ellipse(x, y+22, 10, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Thruster flame
  ctx.save();
  ctx.globalAlpha = 0.85 + Math.sin(frameCount*0.3)*0.15;
  const fl = ctx.createLinearGradient(x, y+18, x, y+32+Math.sin(frameCount*0.2)*6);
  fl.addColorStop(0, '#00ccff');
  fl.addColorStop(0.5, '#0044ff');
  fl.addColorStop(1, 'rgba(0,0,255,0)');
  ctx.fillStyle = fl;
  ctx.beginPath();
  ctx.moveTo(x-7, y+18);
  ctx.lineTo(x+7, y+18);
  ctx.lineTo(x, y+32+Math.sin(frameCount*0.2)*6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Body
  ctx.save();
  // Main fuselage
  const bodyGrad = ctx.createLinearGradient(x-18, y-18, x+18, y+18);
  bodyGrad.addColorStop(0, '#bde8ff');
  bodyGrad.addColorStop(0.5, '#6acfff');
  bodyGrad.addColorStop(1, '#1a6099');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(x, y-18);        // nose
  ctx.lineTo(x+5, y-5);
  ctx.lineTo(x+18, y+8);     // right wing tip
  ctx.lineTo(x+12, y+18);
  ctx.lineTo(x+6, y+12);
  ctx.lineTo(x, y+15);
  ctx.lineTo(x-6, y+12);
  ctx.lineTo(x-12, y+18);
  ctx.lineTo(x-18, y+8);
  ctx.lineTo(x-5, y-5);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = 'rgba(0,220,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(x, y-4, 5, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing stripe
  ctx.strokeStyle = 'rgba(0,200,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x-18, y+8); ctx.lineTo(x+18, y+8); ctx.stroke();

  ctx.restore();

  // Shield ring
  if (p.invincible > 0) {
    ctx.save();
    ctx.globalAlpha = p.invincible / 120;
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ─── Bullets ─────────────────────────────────────────────────
function shoot() {
  const p = player;
  const bx = p.x, by = p.y - 20;
  const pw = p.power;

  if (pw === 1) {
    bullets.push({ x: bx, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 2) {
    bullets.push({ x: bx-6, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+6, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 3) {
    bullets.push({ x: bx, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 12 });
    bullets.push({ x: bx-10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 4) {
    bullets.push({ x: bx, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx-10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx-18, y: by+4, w: 3, h: 10, vy: -12, vx: -1, color: '#ff88ff', dmg: 8 });
    bullets.push({ x: bx+18, y: by+4, w: 3, h: 10, vy: -12, vx: 1, color: '#ff88ff', dmg: 8 });
  } else {
    bullets.push({ x: bx, y: by, w: 5, h: 16, vy: -16, color: '#ff4400', dmg: 20 });
    bullets.push({ x: bx-10, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx+10, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx-20, y: by+4, w: 3, h: 12, vy: -13, vx: -0.5, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+20, y: by+4, w: 3, h: 12, vy: -13, vx: 0.5, color: '#00ffff', dmg: 10 });
  }
}

// ─── Enemies ─────────────────────────────────────────────────
const ENEMY_TYPES = {
  fighter: { hp: 20, speed: 1.5, score: 100, w: 28, h: 28, color: '#ff4444', fireRate: 80 },
  bomber:  { hp: 60, speed: 0.8, score: 250, w: 38, h: 32, color: '#ff8800', fireRate: 50 },
  fast:    { hp: 10, speed: 3.0, score: 150, w: 22, h: 22, color: '#ff22aa', fireRate: 120 },
  heavy:   { hp: 120, speed: 0.5, score: 400, w: 44, h: 40, color: '#aa44ff', fireRate: 40 },
};

function spawnEnemy(type, x, y, path) {
  const t = ENEMY_TYPES[type];
  enemies.push({
    type, x, y,
    w: t.w, h: t.h,
    hp: t.hp + (stage-1)*10,
    maxHp: t.hp + (stage-1)*10,
    speed: t.speed,
    score: t.score,
    color: t.color,
    fireRate: t.fireRate,
    fireCooldown: Math.random()*t.fireRate,
    path: path || null,
    pathIdx: 0,
    vx: 0, vy: t.speed,
    angle: 0,
    dead: false,
  });
  stageEnemyCount++;
}

function drawEnemy(e) {
  const x = e.x, y = e.y;
  ctx.save();
  ctx.translate(x, y);

  if (e.type === 'fighter') {
    const g = ctx.createLinearGradient(-14,-14,14,14);
    g.addColorStop(0,'#ff6666'); g.addColorStop(1,'#880000');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,14); ctx.lineTo(14,-10); ctx.lineTo(6,-4);
    ctx.lineTo(0,-14); ctx.lineTo(-6,-4); ctx.lineTo(-14,-10);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffaaaa';
    ctx.beginPath(); ctx.ellipse(0,0,4,6,0,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'bomber') {
    ctx.fillStyle = '#cc5500';
    ctx.beginPath();
    ctx.moveTo(0,18); ctx.lineTo(20,-8); ctx.lineTo(14,-14);
    ctx.lineTo(0,-10); ctx.lineTo(-14,-14); ctx.lineTo(-20,-8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff8844';
    ctx.fillRect(-6,-8,12,14);
    // engine nacelles
    ctx.fillStyle='#884400';
    ctx.beginPath(); ctx.ellipse(-15,-2,5,3,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(15,-2,5,3,-0.3,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'fast') {
    ctx.fillStyle = '#ff22aa';
    ctx.beginPath();
    ctx.moveTo(0,11); ctx.lineTo(11,-4); ctx.lineTo(0,-11); ctx.lineTo(-11,-4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffaaee';
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'heavy') {
    const g = ctx.createLinearGradient(-22,-20,22,20);
    g.addColorStop(0,'#cc88ff'); g.addColorStop(1,'#440088');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,20); ctx.lineTo(22,-6); ctx.lineTo(18,-18);
    ctx.lineTo(0,-12); ctx.lineTo(-18,-18); ctx.lineTo(-22,-6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(200,150,255,0.5)';
    ctx.beginPath(); ctx.ellipse(0,-2,7,10,0,0,Math.PI*2); ctx.fill();
  }

  // HP bar
  if (e.hp < e.maxHp) {
    const bw = e.w;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(-bw/2, -e.h/2-8, bw, 4);
    ctx.fillStyle='#00ff88';
    ctx.fillRect(-bw/2, -e.h/2-8, bw*(e.hp/e.maxHp), 4);
  }

  ctx.restore();
}

// ─── Boss ────────────────────────────────────────────────────
// 보스 타입 목록 (스테이지에 따라 순환)
const BOSS_DEFS = [
  { name:'IRON EAGLE',   w:96, h:84,  color1:'#4488ff', color2:'#0022aa', auraColor:'100,160,255' },
  { name:'DEATH SERPENT',w:100,h:72,  color1:'#22cc44', color2:'#005511', auraColor:'50,200,80'  },
  { name:'CRIMSON SKULL',w:90, h:90,  color1:'#ff3322', color2:'#880000', auraColor:'255,60,40'  },
  { name:'VOID EMPRESS', w:104,h:88,  color1:'#cc44ff', color2:'#440088', auraColor:'180,60,255' },
  { name:'GOLDEN TYRANT',w:108,h:80,  color1:'#ffcc00', color2:'#884400', auraColor:'255,200,0'  },
];

function createBoss() {
  const idx = (stage - 1) % BOSS_DEFS.length;
  const def = BOSS_DEFS[idx];
  return {
    x: W/2, y: -80,
    w: def.w, h: def.h,
    hp: 800 + stage*200,
    maxHp: 800 + stage*200,
    phase: 1,
    vx: 1.5, vy: 0.8,
    targetY: 120,
    fireTimer: 0,
    angle: 0,
    pattern: 0,
    patternTimer: 0,
    arrived: false,
    dead: false,
    score: 5000 + stage*1000,
    bossType: idx,
    def: def,
  };
}

// ── 공통: 오라 + HP바 ──────────────────────────────────────────
function drawBossAura(b, r) {
  const hp = b.hp/b.maxHp;
  const aura = ctx.createRadialGradient(0,0,18,0,0,r);
  const [ar,ag,ab] = b.def.auraColor.split(',');
  aura.addColorStop(0, `rgba(${ar},${ag},${ab},${hp>0.5?0.28:0.45})`);
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
}
function drawBossHPBar(b, hw) {
  const hp = b.hp/b.maxHp;
  const bw = hw*2;
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(-hw, -b.h/2-14, bw, 8);
  const barGrad = ctx.createLinearGradient(-hw,-b.h/2-14, hw,-b.h/2-14);
  barGrad.addColorStop(0, hp>0.5?b.def.color1:'#ff2200');
  barGrad.addColorStop(1, hp>0.5?b.def.color2:'#880000');
  ctx.fillStyle = barGrad;
  ctx.fillRect(-hw, -b.h/2-14, bw*hp, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.strokeRect(-hw, -b.h/2-14, bw, 8);
}

// ── 보스 0: IRON EAGLE (파란 전투기형) ────────────────────────
function drawBoss0(b) {
  const hp = b.hp/b.maxHp;
  const pulse = Math.sin(frameCount*0.12)*3;
  const c1 = hp>0.5?b.def.color1:'#ff6644', c2 = hp>0.5?b.def.color2:'#aa2200';

  drawBossAura(b, 80);

  // 동체
  const bodyG = ctx.createLinearGradient(-20,-42,20,42);
  bodyG.addColorStop(0, c1); bodyG.addColorStop(1, c2);
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(0,-42);
  ctx.bezierCurveTo(12,-30, 16,-10, 14,20);
  ctx.lineTo(8,38); ctx.lineTo(0,30); ctx.lineTo(-8,38);
  ctx.lineTo(-14,20);
  ctx.bezierCurveTo(-16,-10, -12,-30, 0,-42);
  ctx.fill();

  // 왼쪽 날개
  ctx.beginPath();
  ctx.moveTo(-14,0); ctx.lineTo(-52,-8+pulse); ctx.lineTo(-48,22); ctx.lineTo(-14,24);
  ctx.closePath();
  ctx.fillStyle = c1; ctx.fill();
  // 오른쪽 날개
  ctx.beginPath();
  ctx.moveTo(14,0); ctx.lineTo(52,-8+pulse); ctx.lineTo(48,22); ctx.lineTo(14,24);
  ctx.closePath();
  ctx.fill();

  // 후미 날개
  ctx.beginPath();
  ctx.moveTo(-8,30); ctx.lineTo(-26,42+pulse*0.5); ctx.lineTo(-16,46); ctx.lineTo(-6,36);
  ctx.closePath(); ctx.fillStyle=c2; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8,30); ctx.lineTo(26,42+pulse*0.5); ctx.lineTo(16,46); ctx.lineTo(6,36);
  ctx.closePath(); ctx.fill();

  // 엔진 4개
  [-34,-18,18,34].forEach(ex=>{
    ctx.fillStyle='#001133';
    ctx.beginPath(); ctx.ellipse(ex,26,5,8,0,0,Math.PI*2); ctx.fill();
    const fl=ctx.createLinearGradient(ex,30,ex,46+pulse);
    fl.addColorStop(0,'rgba(80,180,255,0.9)'); fl.addColorStop(1,'rgba(0,80,255,0)');
    ctx.fillStyle=fl;
    ctx.beginPath(); ctx.moveTo(ex-4,30); ctx.lineTo(ex+4,30); ctx.lineTo(ex,46+pulse); ctx.closePath(); ctx.fill();
  });

  // 조종석
  const cockG=ctx.createLinearGradient(-8,-28,8,-4);
  cockG.addColorStop(0,'rgba(180,230,255,0.9)'); cockG.addColorStop(1,'rgba(60,140,220,0.5)');
  ctx.fillStyle=cockG;
  ctx.beginPath(); ctx.ellipse(0,-18,7,12,0,0,Math.PI*2); ctx.fill();

  // 미사일 포드 (날개 끝)
  [-48,48].forEach(mx=>{
    ctx.fillStyle='#223355';
    ctx.beginPath(); ctx.ellipse(mx,4,4,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=hp>0.5?'#4488ff':'#ff4400';
    ctx.beginPath(); ctx.arc(mx,12,3,0,Math.PI*2); ctx.fill();
  });

  drawBossHPBar(b,60);
}

// ── 보스 1: DEATH SERPENT (녹색 다관절 뱀형) ──────────────────
function drawBoss1(b) {
  const hp = b.hp/b.maxHp;
  const t = frameCount*0.08;
  const c1=hp>0.5?b.def.color1:'#ff6622', c2=hp>0.5?b.def.color2:'#882200';

  drawBossAura(b, 76);

  // 몸통 세그먼트 (물결)
  const segs = 7;
  for(let i=segs-1;i>=0;i--){
    const si = i/(segs-1);
    const sx = Math.sin(t + i*0.7)*18*(1-si*0.4);
    const sy = -30 + i*13;
    const sr = 14-i*1.2;
    const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
    sg.addColorStop(0, i===0?'#88ffaa':c1);
    sg.addColorStop(1, c2);
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
    // 비늘 무늬
    if(i>0){
      ctx.strokeStyle='rgba(0,255,100,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(sx,sy,sr-3,Math.PI*0.2,Math.PI*0.8); ctx.stroke();
    }
  }

  // 머리
  const hx=Math.sin(t)*18, hy=-30;
  ctx.fillStyle=c1;
  ctx.beginPath();
  ctx.moveTo(hx,-44); ctx.lineTo(hx+18,-28); ctx.lineTo(hx+14,-14);
  ctx.lineTo(hx,-10); ctx.lineTo(hx-14,-14); ctx.lineTo(hx-18,-28);
  ctx.closePath(); ctx.fill();

  // 눈 (두개)
  [-7,7].forEach(ex=>{
    ctx.fillStyle='#ffff00';
    ctx.beginPath(); ctx.ellipse(hx+ex,-30,5,7,0.2*(ex>0?1:-1),0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(hx+ex,-30,2,4,0,0,Math.PI*2); ctx.fill();
    // 눈 빛
    ctx.fillStyle='rgba(255,255,100,0.7)';
    ctx.beginPath(); ctx.arc(hx+ex-1,-32,1.5,0,Math.PI*2); ctx.fill();
  });

  // 혀
  const tongueLen=12+Math.sin(t*3)*4;
  ctx.strokeStyle='#ff2244'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(hx,-10); ctx.lineTo(hx,-10+tongueLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx,-10+tongueLen); ctx.lineTo(hx-5,-10+tongueLen+6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx,-10+tongueLen); ctx.lineTo(hx+5,-10+tongueLen+6); ctx.stroke();

  // 날개 (박쥐날개형)
  const wingFlap=Math.sin(t*2)*8;
  ctx.fillStyle=hp>0.5?'rgba(30,160,60,0.7)':'rgba(180,60,20,0.7)';
  ctx.beginPath();
  ctx.moveTo(-14,-10); ctx.quadraticCurveTo(-50,-20+wingFlap,-55,10+wingFlap);
  ctx.quadraticCurveTo(-40,20,-14,8); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14,-10); ctx.quadraticCurveTo(50,-20+wingFlap,55,10+wingFlap);
  ctx.quadraticCurveTo(40,20,14,8); ctx.closePath(); ctx.fill();

  drawBossHPBar(b, 58);
}

// ── 보스 2: CRIMSON SKULL (붉은 해골 요새형) ──────────────────
function drawBoss2(b) {
  const hp = b.hp/b.maxHp;
  const t = frameCount;
  const rot = Math.sin(t*0.04)*0.08;

  drawBossAura(b, 78);
  ctx.rotate(rot);

  // 외부 회전 링
  ctx.strokeStyle=hp>0.5?'rgba(255,60,40,0.5)':'rgba(255,200,0,0.5)';
  ctx.lineWidth=4;
  ctx.setLineDash([12,8]);
  ctx.lineDashOffset=-t*0.8;
  ctx.beginPath(); ctx.arc(0,0,52,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // 포탑 4개 (회전링 위)
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2+t*0.02;
    const tx=Math.cos(a)*46, ty=Math.sin(a)*46;
    ctx.fillStyle=hp>0.5?'#881111':'#ffaa00';
    ctx.beginPath(); ctx.arc(tx,ty,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#330000';
    ctx.beginPath(); ctx.arc(tx,ty,3,0,Math.PI*2); ctx.fill();
  }

  ctx.rotate(-rot);

  // 해골 몸통 육각형
  ctx.fillStyle=hp>0.5?'#cc2211':'#ff4400';
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3-Math.PI/6;
    i===0?ctx.moveTo(Math.cos(a)*40,Math.sin(a)*40):ctx.lineTo(Math.cos(a)*40,Math.sin(a)*40);
  }
  ctx.closePath(); ctx.fill();

  // 해골 내부 어두운 패널
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3-Math.PI/6;
    i===0?ctx.moveTo(Math.cos(a)*28,Math.sin(a)*28):ctx.lineTo(Math.cos(a)*28,Math.sin(a)*28);
  }
  ctx.closePath(); ctx.fill();

  // 눈구멍 2개
  const eyePulse=0.85+Math.sin(t*0.12)*0.15;
  [-13,13].forEach(ex=>{
    // 소켓
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(ex,-8,9,11,0,0,Math.PI*2); ctx.fill();
    // 붉은 눈빛
    const eyeG=ctx.createRadialGradient(ex,-8,0,ex,-8,8);
    eyeG.addColorStop(0,`rgba(255,50,0,${eyePulse})`);
    eyeG.addColorStop(0.6,'rgba(180,0,0,0.5)');
    eyeG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=eyeG;
    ctx.beginPath(); ctx.ellipse(ex,-8,8,10,0,0,Math.PI*2); ctx.fill();
  });

  // 코뼈
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.moveTo(-4,4); ctx.lineTo(4,4); ctx.lineTo(2,14); ctx.lineTo(-2,14); ctx.closePath(); ctx.fill();

  // 이빨
  ctx.fillStyle='rgba(220,220,200,0.85)';
  for(let i=0;i<5;i++){
    ctx.fillRect(-16+i*8, 20, 5, 10-(i%2)*3);
  }
  // 이빨 그림자
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(-16, 20, 40, 2);

  // 중앙 코어 (에너지 구)
  const coreG=ctx.createRadialGradient(0,8,0,0,8,14);
  coreG.addColorStop(0,hp>0.5?'rgba(255,200,50,0.95)':'rgba(255,80,0,0.95)');
  coreG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=coreG;
  ctx.beginPath(); ctx.arc(0,8,14,0,Math.PI*2); ctx.fill();

  drawBossHPBar(b, 60);
}

// ── 보스 3: VOID EMPRESS (보라 여왕 형태) ─────────────────────
function drawBoss3(b) {
  const hp = b.hp/b.maxHp;
  const t = frameCount;
  const breathe = Math.sin(t*0.06)*4;

  drawBossAura(b, 85);

  // 왕관 (위쪽 5개 뿔)
  const crownC = hp>0.5?'#dd88ff':'#ff8844';
  for(let i=0;i<5;i++){
    const cx=-28+i*14, baseY=-38;
    const tipH=12+(i===2?8:i===1||i===3?4:0);
    ctx.fillStyle=crownC;
    ctx.beginPath();
    ctx.moveTo(cx-5,baseY); ctx.lineTo(cx,baseY-tipH); ctx.lineTo(cx+5,baseY);
    ctx.closePath(); ctx.fill();
    // 보석
    if(i%2===0){
      ctx.fillStyle='rgba(255,255,150,0.9)';
      ctx.beginPath(); ctx.arc(cx,baseY-tipH*0.5,2.5,0,Math.PI*2); ctx.fill();
    }
  }

  // 망토 (뒤쪽)
  const cloakG=ctx.createLinearGradient(-52,0,52,44+breathe);
  cloakG.addColorStop(0,hp>0.5?'rgba(80,0,130,0.85)':'rgba(130,40,0,0.85)');
  cloakG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cloakG;
  ctx.beginPath();
  ctx.moveTo(-14,-30);
  ctx.quadraticCurveTo(-52,10,-50,44+breathe);
  ctx.quadraticCurveTo(-26,52,0,46+breathe);
  ctx.quadraticCurveTo(26,52,50,44+breathe);
  ctx.quadraticCurveTo(52,10,14,-30);
  ctx.closePath(); ctx.fill();

  // 몸체 (드레스형)
  const bodyG=ctx.createLinearGradient(-24,-36,24,38+breathe);
  bodyG.addColorStop(0,hp>0.5?'#cc55ff':'#ff6633');
  bodyG.addColorStop(0.5,hp>0.5?'#8800cc':'#cc2200');
  bodyG.addColorStop(1,hp>0.5?'#440066':'#661100');
  ctx.fillStyle=bodyG;
  ctx.beginPath();
  ctx.moveTo(0,-38);
  ctx.bezierCurveTo(18,-30,22,-10,20,10);
  ctx.quadraticCurveTo(28,30+breathe,16,42+breathe);
  ctx.quadraticCurveTo(0,48+breathe,-16,42+breathe);
  ctx.quadraticCurveTo(-28,30+breathe,-20,10);
  ctx.bezierCurveTo(-22,-10,-18,-30,0,-38);
  ctx.fill();

  // 팔 2개
  const armWave=Math.sin(t*0.07)*12;
  [[-1,1]].flat();
  // 왼팔
  ctx.strokeStyle=hp>0.5?'#aa44dd':'#dd4422'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-20,-10); ctx.quadraticCurveTo(-46,-10+armWave,-52,10+armWave); ctx.stroke();
  // 왼손 (구체)
  ctx.fillStyle=hp>0.5?'#ff88ff':'#ffaa44';
  ctx.beginPath(); ctx.arc(-52,10+armWave,9+Math.sin(t*0.15)*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-55,7+armWave,3,0,Math.PI*2); ctx.fill();
  // 오른팔
  ctx.strokeStyle=hp>0.5?'#aa44dd':'#dd4422'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(20,-10); ctx.quadraticCurveTo(46,-10-armWave,52,10-armWave); ctx.stroke();
  ctx.fillStyle=hp>0.5?'#ff88ff':'#ffaa44';
  ctx.beginPath(); ctx.arc(52,10-armWave,9+Math.sin(t*0.15+1)*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(55,7-armWave,3,0,Math.PI*2); ctx.fill();

  // 얼굴
  ctx.fillStyle=hp>0.5?'#eeccff':'#ffddaa';
  ctx.beginPath(); ctx.ellipse(0,-20,13,16,0,0,Math.PI*2); ctx.fill();

  // 눈
  const eyeC=hp>0.5?'rgba(160,0,255,0.9)':'rgba(255,80,0,0.9)';
  [-6,6].forEach(ex=>{
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(ex,-22,4,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=eyeC;
    ctx.beginPath(); ctx.ellipse(ex,-22,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(ex-1,-24,1.2,0,Math.PI*2); ctx.fill();
  });

  // 입
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-14,4,0.2,Math.PI-0.2); ctx.stroke();

  // 중앙 보석 (가슴)
  const gemG=ctx.createRadialGradient(0,-2,0,0,-2,10);
  gemG.addColorStop(0,'rgba(255,220,80,1)'); gemG.addColorStop(1,'rgba(200,100,0,0)');
  ctx.fillStyle=gemG;
  ctx.beginPath(); ctx.arc(0,-2,10,0,Math.PI*2); ctx.fill();

  drawBossHPBar(b, 64);
}

// ── 보스 4: GOLDEN TYRANT (황금 전차형 요새) ──────────────────
function drawBoss4(b) {
  const hp = b.hp/b.maxHp;
  const t = frameCount;
  const rumble = Math.sin(t*0.3)*1.5;

  drawBossAura(b, 82);

  // 무한궤도 (좌우 트랙)
  [-46,46].forEach(tx=>{
    ctx.fillStyle=hp>0.5?'#886600':'#884400';
    ctx.beginPath(); ctx.roundRect(tx-10,-32,20,68,6); ctx.fill();
    // 트랙 체인 무늬
    ctx.fillStyle='rgba(0,0,0,0.3)';
    for(let i=0;i<5;i++){
      ctx.fillRect(tx-9,-28+i*13,(t*2+i*7)%18>9?18:10,4);
    }
    // 구동 휠 (위아래)
    [[-26,true],[34,false]].forEach(([wy,isTop])=>{
      ctx.fillStyle=isTop?'#aabb00':'#664400';
      ctx.beginPath(); ctx.arc(tx,wy,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.arc(tx,wy,5,0,Math.PI*2); ctx.fill();
    });
  });

  // 차체 메인
  const hullG=ctx.createLinearGradient(-36,-30,36,36);
  hullG.addColorStop(0,hp>0.5?'#ffdd44':'#ff8800');
  hullG.addColorStop(0.5,hp>0.5?'#cc9900':'#cc4400');
  hullG.addColorStop(1,hp>0.5?'#886600':'#881100');
  ctx.fillStyle=hullG;
  ctx.beginPath(); ctx.roundRect(-36,-30,72,66,4); ctx.fill();

  // 장갑판 리벳
  ctx.fillStyle='rgba(255,255,200,0.3)';
  [[-28,-22],[28,-22],[-28,30],[28,30]].forEach(([rx,ry])=>{
    ctx.beginPath(); ctx.arc(rx+rumble*0.2,ry,3,0,Math.PI*2); ctx.fill();
  });

  // 터렛 베이스
  ctx.fillStyle=hp>0.5?'#ccaa00':'#cc5500';
  ctx.beginPath(); ctx.ellipse(0,-4,28,22,0,0,Math.PI*2); ctx.fill();

  // 터렛 포탑
  ctx.fillStyle=hp>0.5?'#ffee55':'#ff9900';
  ctx.beginPath(); ctx.roundRect(-18,-22,36,28,3); ctx.fill();

  // 주포 3개
  const gunColors=[hp>0.5?'#ffdd00':'#ff6600','#554400','#554400'];
  [-14,0,14].forEach((gx,gi)=>{
    ctx.fillStyle='#332200';
    ctx.beginPath(); ctx.roundRect(gx-4,-42,8,24,2); ctx.fill();
    ctx.fillStyle=gi===0?(hp>0.5?'#ffcc00':'#ff8800'):'#887733';
    ctx.beginPath(); ctx.arc(gx,-42,5,0,Math.PI*2); ctx.fill();
  });

  // 관측창 (조종석)
  const viewG=ctx.createLinearGradient(-10,-18,10,-4);
  viewG.addColorStop(0,'rgba(150,220,255,0.8)'); viewG.addColorStop(1,'rgba(50,100,200,0.4)');
  ctx.fillStyle=viewG;
  ctx.beginPath(); ctx.ellipse(0,-12,10,7,0,0,Math.PI*2); ctx.fill();
  // 창 반사
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(-3,-14,4,2.5,0.4,0,Math.PI*2); ctx.fill();

  // 사이드 기관총
  [-32,32].forEach(sx=>{
    ctx.fillStyle='#443300';
    ctx.beginPath(); ctx.roundRect(sx-3,0,6,20,1); ctx.fill();
    ctx.fillStyle=hp>0.5?'#ffaa00':'#ff4400';
    ctx.beginPath(); ctx.arc(sx,20,4,0,Math.PI*2); ctx.fill();
    // 총구 화염 (랜덤)
    if(Math.random()<0.15){
      const muzzleG=ctx.createRadialGradient(sx,22,0,sx,22,6);
      muzzleG.addColorStop(0,'rgba(255,220,100,0.9)'); muzzleG.addColorStop(1,'rgba(255,100,0,0)');
      ctx.fillStyle=muzzleG;
      ctx.beginPath(); ctx.arc(sx,22,6,0,Math.PI*2); ctx.fill();
    }
  });

  // 황금 문양 (차체 정중앙)
  ctx.save();
  ctx.strokeStyle=`rgba(255,230,100,${0.4+Math.sin(t*0.1)*0.2})`;
  ctx.lineWidth=1.5;
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3+t*0.01;
    ctx.beginPath(); ctx.moveTo(0,22); ctx.lineTo(Math.cos(a)*12,22+Math.sin(a)*10); ctx.stroke();
  }
  ctx.restore();

  drawBossHPBar(b, 62);
}

// ── 메인 drawBoss 디스패처 ─────────────────────────────────────
function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  switch(b.bossType) {
    case 0: drawBoss0(b); break;
    case 1: drawBoss1(b); break;
    case 2: drawBoss2(b); break;
    case 3: drawBoss3(b); break;
    case 4: drawBoss4(b); break;
    default: drawBoss0(b);
  }
  ctx.restore();
}

// ─── Particles ───────────────────────────────────────────────
function explode(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 4 + 1,
      life: Math.random() * 40 + 20,
      maxLife: 60,
      color: colors[Math.floor(Math.random()*colors.length)],
    });
  }
}

// ─── Powerups ────────────────────────────────────────────────
const POWERUP_TYPES = ['power','speed','bomb','shield','health'];
function spawnPowerup(x, y) {
  if (Math.random() > 0.35) return;
  const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerups.push({ x, y, type, vy: 1.5, angle: 0, life: 400 });
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  const colors = {
    power: ['#ffff00','#ff8800'],
    speed: ['#00ffff','#0088ff'],
    bomb: ['#ff4444','#ff0000'],
    shield: ['#00ff88','#008844'],
    health: ['#ff88ff','#ff44ff'],
  };
  const labels = { power:'P', speed:'S', bomb:'B', shield:'★', health:'+' };
  const [c1,c2] = colors[p.type];

  const g = ctx.createRadialGradient(0,0,4,0,0,14);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.fillStyle='white';
  ctx.font = `bold 10px 'Press Start 2P'`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(labels[p.type], 0, 1);
  ctx.restore();
}

function applyPowerup(type) {
  const p = player;
  switch(type) {
    case 'power':
      p.power = Math.min(5, p.power + 1);
      showMsg('POWER UP!', '#ffff00');
      break;
    case 'speed':
      p.speed = Math.min(9, p.speed + 1);
      showMsg('SPEED UP!', '#00ffff');
      break;
    case 'bomb':
      bombs = Math.min(5, bombs + 1);
      showMsg('BOMB GET!', '#ff4444');
      updateBombCount();
      break;
    case 'shield':
      p.invincible = Math.min(300, p.invincible + 200);
      showMsg('SHIELD!', '#00ff88');
      break;
    case 'health':
      p.hp = Math.min(p.maxHp, p.hp + 30);
      updateHealthBar();
      showMsg('REPAIR!', '#ff88ff');
      break;
  }
}

// ─── Messages ────────────────────────────────────────────────
const msgs = [];
function showMsg(text, color) {
  msgs.push({ text, color, x: W/2, y: H/2, life: 80, vy: -0.5 });
}

// ─── Enemy Spawn Waves ────────────────────────────────────────
const waves = [];
let waveTimer = 0;
let currentWave = 0;

function buildWaves() {
  const w = [];
  const totalWaves = 8 + stage * 2;

  for (let i = 0; i < totalWaves; i++) {
    const delay = i * (180 - stage*10);
    if (i % 4 === 0) {
      w.push({ delay, fn: () => {
        for (let j=0;j<3;j++) spawnEnemy('fighter', 80+j*100, -30);
      }});
    } else if (i % 4 === 1) {
      w.push({ delay, fn: () => {
        for (let j=0;j<2;j++) spawnEnemy('bomber', 140+j*140, -40);
      }});
    } else if (i % 4 === 2) {
      w.push({ delay, fn: () => {
        for (let j=0;j<5;j++) spawnEnemy('fast', 50+j*80, -20);
      }});
    } else {
      w.push({ delay, fn: () => {
        spawnEnemy('heavy', W/2-60, -50);
        spawnEnemy('heavy', W/2+60, -50);
      }});
    }
  }
  // Boss wave
  w.push({ delay: totalWaves*(180-stage*10)+200, fn: () => {
    bossActive = true;
    boss = createBoss();
    showMsg('BOSS!', '#ff0000');
  }});
  return w;
}

// ─── Bomb ─────────────────────────────────────────────────────
function useBomb() {
  if (bombs <= 0) return;
  bombs--;
  updateBombCount();
  player.bombBlast = 60;
  // Damage all enemies
  enemies.forEach(e => { e.hp -= 200; });
  if (bossActive && boss) boss.hp -= 400;
  explode(W/2, H/2, 80, ['#ff8800','#ffff00','#ff4400','#ffffff']);
  showMsg('BOMB!', '#ff8800');
}

// ─── Collision ───────────────────────────────────────────────
function rectHit(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 &&
         ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

// ─── HUD Update ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = String(score).padStart(6,'0');
  document.getElementById('highScoreVal').textContent = String(hiScore).padStart(6,'0');
  document.getElementById('stageVal').textContent = String(stage).padStart(2,'0');
  const l = ['✈','✈','✈'].slice(0,Math.max(0,lives)).join(' ');
  document.getElementById('livesVal').textContent = l || '---';
}

function updateHealthBar() {
  const pct = (player.hp / player.maxHp) * 100;
  document.getElementById('healthFill').style.width = pct + '%';
}

function updateBombCount() {
  document.getElementById('bombCount').textContent = '💣 ' + bombs;
}

// ─── Overlay ─────────────────────────────────────────────────
function showOverlay(type) {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  const title = ov.querySelector('.overlay-title');
  const sub = ov.querySelector('.overlay-sub');
  const btn = ov.querySelector('.btn');
  const scoreEl = ov.querySelector('.overlay-score');

  document.getElementById('overlayHi').textContent = String(hiScore).padStart(6,'0');

  if (type === 'menu') {
    title.innerHTML = 'SKY FORCE<br>1945';
    sub.textContent = '▶ PRESS SPACE OR CLICK TO START ◀';
    sub.classList.add('blink');
    btn.textContent = 'START GAME';
    btn.className = 'btn';
    scoreEl.style.display='block';
  } else if (type === 'gameover') {
    title.innerHTML = 'GAME OVER';
    title.style.color='#ff2244';
    title.style.textShadow='0 0 10px #ff2244, 0 0 20px #ff2244';
    sub.textContent = 'SCORE: ' + String(score).padStart(6,'0');
    sub.classList.remove('blink');
    btn.textContent = 'TRY AGAIN';
    btn.className = 'btn btn-red';
    scoreEl.style.display='none';
  } else if (type === 'stageclear') {
    title.innerHTML = `STAGE ${stage}<br>CLEAR!`;
    title.style.color='#00ff88';
    title.style.textShadow='0 0 10px #00ff88, 0 0 20px #00ff88';
    sub.textContent = '▶ PRESS SPACE TO CONTINUE ◀';
    sub.classList.add('blink');
    btn.textContent = 'NEXT STAGE';
    btn.className = 'btn';
    scoreEl.style.display='none';
  }
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  document.querySelector('.overlay-title').style.color='';
  document.querySelector('.overlay-title').style.textShadow='';
}

// ─── Game Init ───────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; stage = 1; bombs = 3;
  player = createPlayer();
  bullets = []; enemyBullets = []; enemies = [];
  particles = []; powerups = [];
  boss = null; bossActive = false;
  stageEnemyCount = 0; stageKillCount = 0;
  waveTimer = 0; currentWave = 0;
  waves.length = 0;
  const built = buildWaves();
  built.forEach(w => waves.push(w));
  frameCount = 0;
  updateHUD(); updateHealthBar(); updateBombCount();
  hideOverlay();
  state = 'playing';
}

function nextStage() {
  stage++;
  bombs = Math.min(5, bombs + 1);
  player.hp = player.maxHp;
  bullets = []; enemyBullets = []; enemies = [];
  particles = []; powerups = [];
  boss = null; bossActive = false;
  stageEnemyCount = 0; stageKillCount = 0;
  waveTimer = 0; currentWave = 0;
  waves.length = 0;
  const built = buildWaves();
  built.forEach(w => waves.push(w));
  updateHUD(); updateHealthBar(); updateBombCount();
  hideOverlay();
  state = 'playing';
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseOverlay').classList.add('active');
  } else if (state === 'paused') {
    state = 'playing';
    document.getElementById('pauseOverlay').classList.remove('active');
  }
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  document.getElementById('pauseOverlay').classList.remove('active');
}

function restartGame() {
  document.getElementById('pauseOverlay').classList.remove('active');
  startGame();
}

function goMainMenu() {
  document.getElementById('pauseOverlay').classList.remove('active');
  state = 'menu';
  showOverlay('menu');
}

function playerDie() {
  explode(player.x, player.y, 60, ['#00ffff','#0088ff','#ffffff','#ffff00']);
  lives--;
  updateHUD();
  if (lives <= 0) {
    if (score > hiScore) { hiScore = score; localStorage.setItem('sf1945_hi', hiScore); }
    saveRanking(score, stage);
    state = 'gameover';
    showOverlay('gameover');
  } else {
    player.hp = player.maxHp;
    player.x = W/2; player.y = H-80;
    player.invincible = 180;
    player.power = Math.max(1, player.power - 1);
    updateHealthBar();
  }
}

// ─── Update ──────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  });

  // Player movement
  const p = player;
  if (keys['ArrowLeft']  || keys['KeyA']) p.x -= p.speed;
  if (keys['ArrowRight'] || keys['KeyD']) p.x += p.speed;
  if (keys['ArrowUp']    || keys['KeyW']) p.y -= p.speed;
  if (keys['ArrowDown']  || keys['KeyS']) p.y += p.speed;
  p.x = Math.max(p.w/2, Math.min(W-p.w/2, p.x));
  p.y = Math.max(p.h/2, Math.min(H-p.h/2, p.y));

  // Trail
  p.trail.push({x:p.x, y:p.y+20});
  if (p.trail.length > 12) p.trail.shift();

  // Shoot
  p.fireCooldown--;
  if ((keys['Space'] || keys['KeyZ']) && p.fireCooldown <= 0) {
    shoot();
    p.fireCooldown = p.fireRate;
  }

  if (p.invincible > 0) p.invincible--;
  if (p.bombBlast > 0) p.bombBlast--;

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy;
    if (b.vx) b.x += b.vx;
    if (b.y < -20 || b.x < -20 || b.x > W+20) { bullets.splice(i,1); continue; }

    // Hit enemies
    let hit = false;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (rectHit(b.x,b.y,b.w,b.h, e.x,e.y,e.w,e.h)) {
        e.hp -= b.dmg;
        explode(b.x, b.y, 5, ['#ffff00','#ffffff']);
        bullets.splice(i,1); hit=true;
        if (e.hp <= 0 && !e.dead) {
          e.dead=true;
          score += e.score; stageKillCount++;
          explode(e.x,e.y,25,['#ff4400','#ff8800','#ffff00','#ffffff']);
          spawnPowerup(e.x, e.y);
          enemies.splice(j,1);
          updateHUD();
        }
        break;
      }
    }
    if (hit) continue;

    // Hit boss
    if (bossActive && boss && !boss.dead) {
      if (rectHit(b.x,b.y,b.w,b.h, boss.x,boss.y,boss.w,boss.h)) {
        boss.hp -= b.dmg;
        explode(b.x,b.y,4,['#aa44ff','#ffffff']);
        bullets.splice(i,1);
        if (boss.hp <= 0) {
          boss.dead=true; bossActive=false;
          score += boss.score;
          for(let k=0;k<120;k++) {
            setTimeout(()=>explode(boss.x+Math.random()*100-50,boss.y+Math.random()*80-40,8,['#ff4400','#ffaa00','#ff0000','#ffffff','#aa44ff']),k*30);
          }
          updateHUD();
          setTimeout(()=>{ state='stageclear'; showOverlay('stageclear'); }, 3000);
        }
      }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H+10 || b.x < -10 || b.x > W+10) { enemyBullets.splice(i,1); continue; }
    if (p.invincible <= 0 && rectHit(b.x,b.y,6,6, p.x,p.y,p.w*0.7,p.h*0.7)) {
      enemyBullets.splice(i,1);
      p.hp -= b.dmg;
      p.invincible = 30;
      explode(p.x,p.y,8,['#ff2244','#ffffff']);
      updateHealthBar();
      if (p.hp <= 0) playerDie();
    }
  }

  // Enemy update
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    // Movement
    if (e.path) {
      const pt = e.path[e.pathIdx];
      if (pt) {
        const dx = pt.x-e.x, dy = pt.y-e.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 4) { e.pathIdx++; }
        else { e.x += dx/dist*e.speed*1.5; e.y += dy/dist*e.speed*1.5; }
      } else { e.y += e.speed*0.5; }
    } else {
      e.y += e.speed;
      e.x += Math.sin(frameCount*0.03+i)*0.8;
    }

    if (e.y > H+60) { enemies.splice(i,1); continue; }

    // Enemy shoot
    e.fireCooldown--;
    if (e.fireCooldown <= 0) {
      e.fireCooldown = e.fireRate;
      const dx = p.x-e.x, dy = p.y-e.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      const spd = 3+stage*0.3;
      enemyBullets.push({ x:e.x, y:e.y+10, vx:dx/d*spd, vy:dy/d*spd, dmg:12, color:e.color });
    }

    // Hit player
    if (p.invincible <= 0 && rectHit(e.x,e.y,e.w*0.8,e.h*0.8, p.x,p.y,p.w*0.7,p.h*0.7)) {
      p.hp -= 30; p.invincible=60;
      explode(p.x,p.y,15,['#ff2244','#ff8800','#ffffff']);
      updateHealthBar();
      if (p.hp <= 0) playerDie();
    }
  }

  // Boss update
  if (bossActive && boss && !boss.dead) {
    const b = boss;
    if (!b.arrived) {
      b.y += 1.5;
      if (b.y >= b.targetY) b.arrived = true;
    } else {
      b.x += b.vx;
      if (b.x > W-60 || b.x < 60) b.vx *= -1;
      b.patternTimer++;

      // Phase 2
      if (b.hp < b.maxHp * 0.5) b.phase = 2;

      // Fire patterns
      b.fireTimer++;
      const fr = b.phase === 1 ? 35 : 20;
      if (b.fireTimer % fr === 0) {
        const count = b.phase === 1 ? 5 : 8;
        for (let i=0; i<count; i++) {
          const a = (Math.PI/count)*i + (b.patternTimer*0.02);
          const spd = b.phase===1 ? 3 : 4;
          enemyBullets.push({ x:b.x, y:b.y+20, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd+1, dmg:15, color:'#ff44ff' });
        }
      }
      // Aimed shot
      if (b.fireTimer % 60 === 0) {
        const dx=p.x-b.x, dy=p.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        const spd=5;
        enemyBullets.push({ x:b.x-35,y:b.y+30, vx:dx/d*spd, vy:dy/d*spd, dmg:20, color:'#ff0000' });
        enemyBullets.push({ x:b.x+35,y:b.y+30, vx:dx/d*spd, vy:dy/d*spd, dmg:20, color:'#ff0000' });
      }
    }

    // Hit player
    if (p.invincible<=0 && rectHit(b.x,b.y,b.w*0.8,b.h*0.8, p.x,p.y,p.w*0.7,p.h*0.7)) {
      p.hp-=40; p.invincible=60;
      updateHealthBar();
      if(p.hp<=0) playerDie();
    }
  }

  // Waves
  if (!bossActive) {
    waveTimer++;
    if (currentWave < waves.length && waveTimer >= waves[currentWave].delay) {
      waves[currentWave].fn();
      currentWave++;
    }
  }

  // Powerups
  for (let i = powerups.length-1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.vy;
    pu.angle += 0.04;
    pu.life--;
    if (pu.y > H+20 || pu.life<=0) { powerups.splice(i,1); continue; }
    if (rectHit(pu.x,pu.y,28,28, p.x,p.y,p.w,p.h)) {
      applyPowerup(pu.type);
      explode(pu.x,pu.y,12,['#ffffff','#ffff00','#00ffff']);
      powerups.splice(i,1);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.05;
    pt.life--;
    pt.r *= 0.97;
    if (pt.life <= 0 || pt.r < 0.3) particles.splice(i,1);
  }

  // Messages
  for (let i = msgs.length-1; i >= 0; i--) {
    const m = msgs[i];
    m.y += m.vy; m.life--;
    if (m.life<=0) msgs.splice(i,1);
  }
}

// ─── Draw ────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0,0,W,H);

  // Nebula
  const neb = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, 200);
  neb.addColorStop(0,'rgba(20,0,60,0.3)'); neb.addColorStop(1,'transparent');
  ctx.fillStyle=neb; ctx.fillRect(0,0,W,H);
  const neb2 = ctx.createRadialGradient(W*0.7, H*0.7, 0, W*0.7, H*0.7, 180);
  neb2.addColorStop(0,'rgba(0,30,60,0.3)'); neb2.addColorStop(1,'transparent');
  ctx.fillStyle=neb2; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.4 + Math.sin(frameCount*0.02+s.brightness*10)*0.3;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bomb blast
  if (player && player.bombBlast > 0) {
    const alpha = player.bombBlast/60*0.4;
    ctx.fillStyle=`rgba(255,140,0,${alpha})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(255,255,200,${alpha*0.5})`;
    ctx.fillRect(0,0,W,H);
  }

  // Particles
  particles.forEach(pt => {
    ctx.globalAlpha = pt.life/pt.maxLife;
    ctx.fillStyle = pt.color;
    ctx.shadowColor = pt.color;
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Player trail
  if (player) {
    player.trail.forEach((t,i) => {
      ctx.globalAlpha = (i/player.trail.length)*0.25;
      ctx.fillStyle='#0088ff';
      ctx.beginPath(); ctx.arc(t.x,t.y,4*(i/player.trail.length),0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  // Powerups
  powerups.forEach(pu => {
    ctx.globalAlpha = pu.life < 80 ? (pu.life/80) : 1;
    drawPowerup(pu);
    ctx.globalAlpha=1;
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Boss
  if (bossActive && boss && !boss.dead) drawBoss(boss);

  // Player bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y-b.h);
    g.addColorStop(0, b.color);
    g.addColorStop(1, 'rgba(255,255,255,0.8)');
    ctx.fillStyle = g;
    ctx.fillRect(b.x-b.w/2, b.y-b.h, b.w, b.h);
    ctx.restore();
  });

  // Player
  if (player && state === 'playing') drawPlayer(player);

  // Messages
  msgs.forEach(m => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, m.life/20);
    ctx.fillStyle = m.color;
    ctx.shadowColor = m.color;
    ctx.shadowBlur = 20;
    ctx.font = "bold 14px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.fillText(m.text, m.x, m.y);
    ctx.restore();
  });

  // Pause overlay
  if (state === 'paused') {
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ffff';
    ctx.shadowColor='#00ffff';
    ctx.shadowBlur=20;
    ctx.font="bold 18px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.fillText('PAUSED', W/2, H/2-10);
    ctx.font="8px 'Press Start 2P'";
    ctx.fillText('P - RESUME', W/2, H/2+20);
    ctx.shadowBlur=0;
  }

  // Boss name label
  if (bossActive && boss && !boss.dead) {
    const bNameColor = boss.def ? boss.def.color1 : '#aa44ff';
    ctx.save();
    ctx.font="7px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.shadowColor = bNameColor; ctx.shadowBlur = 12;
    ctx.fillStyle = bNameColor;
    ctx.fillText('★ ' + (boss.def ? boss.def.name : 'BOSS') + ' ★', boss.x, boss.y - boss.h/2 - 22);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ─── Ranking ─────────────────────────────────────────────────
function saveRanking(sc, stg) {
  rankings.push({ score: sc, stage: stg, date: new Date().toLocaleDateString('ko-KR') });
  rankings.sort((a,b) => b.score - a.score);
  rankings = rankings.slice(0, 5);
  localStorage.setItem('sf1945_rankings', JSON.stringify(rankings));
}

function showRanking() {
  const modal = document.getElementById('rankingModal');
  const table = document.getElementById('rankingTable');
  const medals = ['🥇','🥈','🥉','4','5'];
  const rankClass = ['r1','r2','r3','',''];
  let html = '';
  for (let i = 0; i < 5; i++) {
    const r = rankings[i];
    const cls = rankClass[i];
    if (r) {
      html += `<tr class="${cls}"><td>${medals[i]}</td><td>STAGE ${String(r.stage).padStart(2,'0')}</td><td>${r.date}</td><td>${String(r.score).padStart(6,'0')}</td></tr>`;
    } else {
      html += `<tr class="r-empty"><td>${i+1}</td><td>---</td><td>---</td><td>------</td></tr>`;
    }
  }
  table.innerHTML = html;
  modal.classList.add('active');
  // 게임 중이면 일시정지
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseOverlay').classList.remove('active');
  }
}

function hideRanking() {
  document.getElementById('rankingModal').classList.remove('active');
  // 일시정지 상태였으면 폴즈 화면 복원
  if (state === 'paused') {
    document.getElementById('pauseOverlay').classList.add('active');
  }
}

// ─── Loop ────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── Events ──────────────────────────────────────────────────
document.getElementById('pauseBtn').addEventListener('click', () => {
  if (state === 'playing' || state === 'paused') togglePause();
});
document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('mainMenuBtn').addEventListener('click', goMainMenu);
document.getElementById('rankBtn').addEventListener('click', showRanking);
document.getElementById('rankCloseBtn').addEventListener('click', hideRanking);
document.getElementById('startBtn').addEventListener('click', () => {
  if (state === 'menu') startGame();
  else if (state === 'gameover') { state='menu'; showOverlay('menu'); setTimeout(startGame,50); }
  else if (state === 'stageclear') nextStage();
});

canvas.addEventListener('click', () => {
  if (state === 'menu') startGame();
});

// Touch controls
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  keys['Space']=true;
  if (state==='menu') startGame();
},{passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W/rect.width;
  const scaleY = H/rect.height;
  if (player) {
    player.x = (e.touches[0].clientX-rect.left)*scaleX;
    player.y = (e.touches[0].clientY-rect.top)*scaleY;
  }
},{passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys['Space']=false;
},{passive:false});

// Auto-fire on touch
setInterval(()=>{ if(state==='playing' && player) { shoot(); } }, 150);

// ─── Init ────────────────────────────────────────────────────
initStars();
document.getElementById('overlayHi').textContent = String(hiScore).padStart(6,'0');
document.getElementById('highScoreVal').textContent = String(hiScore).padStart(6,'0');
loop();
</script>
