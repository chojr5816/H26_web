<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKY FORCE 1945</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00ffff;
    --neon-red: #ff2244;
    --neon-yellow: #ffdd00;
    --neon-green: #00ff88;
    --neon-orange: #ff8800;
    --bg-dark: #020408;
    --bg-deep: #050a10;
    --panel-bg: rgba(0, 20, 40, 0.9);
    --glow-cyan: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
    --glow-red: 0 0 10px #ff2244, 0 0 20px #ff2244;
    --glow-yellow: 0 0 10px #ffdd00, 0 0 20px #ffdd00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #hud {
    width: 480px;
    background: var(--panel-bg);
    border: 1px solid var(--neon-cyan);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 30px rgba(0,20,40,0.8);
    position: relative;
    z-index: 10;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .hud-label {
    font-size: 6px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .hud-value {
    font-size: 11px;
    color: white;
    text-shadow: var(--glow-cyan);
  }

  #scoreVal { color: var(--neon-yellow); text-shadow: var(--glow-yellow); }
  #livesVal { color: var(--neon-red); text-shadow: var(--glow-red); }
  #stageVal { color: var(--neon-green); text-shadow: 0 0 10px #00ff88; }

  #healthBar {
    width: 80px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 2px;
    overflow: hidden;
  }

  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #ff2244, #ff8800, #00ff88);
    transition: width 0.2s;
    border-radius: 2px;
    box-shadow: 0 0 8px #00ff88;
  }

  canvas {
    display: block;
    border-left: 1px solid var(--neon-cyan);
    border-right: 1px solid var(--neon-cyan);
    box-shadow: 
      0 0 30px rgba(0,255,255,0.15),
      -2px 0 15px rgba(0,255,255,0.1),
      2px 0 15px rgba(0,255,255,0.1);
    background: #020408;
  }

  #bottomBar {
    width: 480px;
    background: var(--panel-bg);
    border: 1px solid var(--neon-cyan);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 6px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.3);
  }

  .controls-hint {
    font-size: 5px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 1px;
  }

  #bombCount {
    font-size: 9px;
    color: var(--neon-orange);
    text-shadow: 0 0 10px #ff8800;
  }

  /* Overlay screens */
  #overlay {
    position: absolute;
    top: 40px;
    left: 0;
    width: 480px;
    height: 640px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(2,4,8,0.92);
    z-index: 100;
    gap: 20px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.3;
  }

  .overlay-sub {
    font-size: 7px;
    color: var(--neon-yellow);
    text-shadow: var(--glow-yellow);
    letter-spacing: 2px;
    text-align: center;
  }

  .overlay-score {
    font-size: 12px;
    color: white;
    text-shadow: var(--glow-cyan);
    text-align: center;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 28px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: var(--glow-cyan);
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.05);
    transition: all 0.2s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0,255,255,0.1);
    transform: scale(1.05);
  }

  .btn-red {
    border-color: var(--neon-red);
    color: var(--neon-red);
    text-shadow: var(--glow-red);
    box-shadow: 0 0 15px rgba(255,34,68,0.3), inset 0 0 15px rgba(255,34,68,0.05);
  }
  .btn-red:hover {
    background: rgba(255,34,68,0.1);
    box-shadow: var(--glow-red), inset 0 0 20px rgba(255,34,68,0.1);
  }

  .blink {
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .scanline {
    position: absolute;
    top: 40px;
    left: 0;
    width: 480px;
    height: 640px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  .logo-line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  #highScoreVal {
    font-size: 10px;
    color: var(--neon-green);
    text-shadow: 0 0 10px #00ff88;
  }

  .power-icons {
    display: flex;
    gap: 8px;
    font-size: 6px;
    color: rgba(0,255,255,0.6);
    letter-spacing: 1px;
  }

  #mobileControls {
    display: none;
  }

  @media (max-width: 520px) {
    #gameWrapper { transform: scale(0.85); transform-origin: top center; }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreVal">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-value" id="highScoreVal">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">SHIELD</span>
      <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span class="hud-value" id="livesVal">✈ ✈ ✈</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">STAGE</span>
      <span class="hud-value" id="stageVal">01</span>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="gameCanvas" width="480" height="640"></canvas>

  <!-- Scanline overlay -->
  <div class="scanline"></div>

  <!-- Overlay -->
  <div id="overlay">
    <div class="logo-line"></div>
    <div class="overlay-title">SKY FORCE<br>1945</div>
    <div class="logo-line"></div>
    <div class="overlay-sub blink">▶ PRESS SPACE OR CLICK TO START ◀</div>
    <div class="overlay-score">
      <span style="font-size:7px;color:rgba(255,255,255,0.5)">HI-SCORE: </span>
      <span id="overlayHi">000000</span>
    </div>
    <div class="power-icons">
      ◆ SPEED UP &nbsp; ★ POWER UP &nbsp; ♦ BOMB &nbsp; ✦ SHIELD
    </div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <!-- Bottom bar -->
  <div id="bottomBar">
    <span class="controls-hint">← → ↑ ↓ MOVE &nbsp;|&nbsp; Z / SPACE SHOOT &nbsp;|&nbsp; X BOMB</span>
    <span id="bombCount">💣 3</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// ─── Game State ───────────────────────────────────────────────
let state = 'menu'; // menu | playing | paused | gameover | stageclear
let score = 0;
let hiScore = parseInt(localStorage.getItem('sf1945_hi') || '0');
let lives = 3;
let stage = 1;
let bombs = 3;
let frameCount = 0;
let bossActive = false;
let stageEnemyCount = 0;
let stageKillCount = 0;

// ─── Keys ────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'playing') {
    if (e.code === 'KeyX' || e.code === 'KeyB') useBomb();
    if (e.code === 'KeyP') togglePause();
  }
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'menu') startGame();
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'gameover') { state='menu'; showOverlay('menu'); }
  if (e.code === 'Space' && state === 'stageclear') nextStage();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Entities ─────────────────────────────────────────────────
let player = null, bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [], boss = null;

// ─── Stars ───────────────────────────────────────────────────
const stars = [];
function initStars() {
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random()
    });
  }
}

// ─── Player ──────────────────────────────────────────────────
function createPlayer() {
  return {
    x: W / 2, y: H - 80,
    w: 36, h: 36,
    speed: 5,
    hp: 100, maxHp: 100,
    fireRate: 8,
    fireCooldown: 0,
    power: 1, // 1-5
    invincible: 0,
    trail: [],
    bombBlast: 0,
  };
}

// ─── Draw Player ─────────────────────────────────────────────
function drawPlayer(p) {
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) return;

  const x = p.x, y = p.y;

  // Engine glow
  ctx.save();
  const eg = ctx.createRadialGradient(x, y+22, 0, x, y+22, 18);
  eg.addColorStop(0, 'rgba(0,180,255,0.6)');
  eg.addColorStop(1, 'rgba(0,60,180,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.ellipse(x, y+22, 10, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Thruster flame
  ctx.save();
  ctx.globalAlpha = 0.85 + Math.sin(frameCount*0.3)*0.15;
  const fl = ctx.createLinearGradient(x, y+18, x, y+32+Math.sin(frameCount*0.2)*6);
  fl.addColorStop(0, '#00ccff');
  fl.addColorStop(0.5, '#0044ff');
  fl.addColorStop(1, 'rgba(0,0,255,0)');
  ctx.fillStyle = fl;
  ctx.beginPath();
  ctx.moveTo(x-7, y+18);
  ctx.lineTo(x+7, y+18);
  ctx.lineTo(x, y+32+Math.sin(frameCount*0.2)*6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Body
  ctx.save();
  // Main fuselage
  const bodyGrad = ctx.createLinearGradient(x-18, y-18, x+18, y+18);
  bodyGrad.addColorStop(0, '#bde8ff');
  bodyGrad.addColorStop(0.5, '#6acfff');
  bodyGrad.addColorStop(1, '#1a6099');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(x, y-18);        // nose
  ctx.lineTo(x+5, y-5);
  ctx.lineTo(x+18, y+8);     // right wing tip
  ctx.lineTo(x+12, y+18);
  ctx.lineTo(x+6, y+12);
  ctx.lineTo(x, y+15);
  ctx.lineTo(x-6, y+12);
  ctx.lineTo(x-12, y+18);
  ctx.lineTo(x-18, y+8);
  ctx.lineTo(x-5, y-5);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = 'rgba(0,220,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(x, y-4, 5, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing stripe
  ctx.strokeStyle = 'rgba(0,200,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x-18, y+8); ctx.lineTo(x+18, y+8); ctx.stroke();

  ctx.restore();

  // Shield ring
  if (p.invincible > 0) {
    ctx.save();
    ctx.globalAlpha = p.invincible / 120;
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ─── Bullets ─────────────────────────────────────────────────
function shoot() {
  const p = player;
  const bx = p.x, by = p.y - 20;
  const pw = p.power;

  if (pw === 1) {
    bullets.push({ x: bx, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 2) {
    bullets.push({ x: bx-6, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+6, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 3) {
    bullets.push({ x: bx, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 12 });
    bullets.push({ x: bx-10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
  } else if (pw === 4) {
    bullets.push({ x: bx, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx-10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+10, y: by, w: 3, h: 12, vy: -14, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx-18, y: by+4, w: 3, h: 10, vy: -12, vx: -1, color: '#ff88ff', dmg: 8 });
    bullets.push({ x: bx+18, y: by+4, w: 3, h: 10, vy: -12, vx: 1, color: '#ff88ff', dmg: 8 });
  } else {
    bullets.push({ x: bx, y: by, w: 5, h: 16, vy: -16, color: '#ff4400', dmg: 20 });
    bullets.push({ x: bx-10, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx+10, y: by, w: 4, h: 14, vy: -15, color: '#ffff00', dmg: 15 });
    bullets.push({ x: bx-20, y: by+4, w: 3, h: 12, vy: -13, vx: -0.5, color: '#00ffff', dmg: 10 });
    bullets.push({ x: bx+20, y: by+4, w: 3, h: 12, vy: -13, vx: 0.5, color: '#00ffff', dmg: 10 });
  }
}

// ─── Enemies ─────────────────────────────────────────────────
const ENEMY_TYPES = {
  fighter: { hp: 20, speed: 1.5, score: 100, w: 28, h: 28, color: '#ff4444', fireRate: 80 },
  bomber:  { hp: 60, speed: 0.8, score: 250, w: 38, h: 32, color: '#ff8800', fireRate: 50 },
  fast:    { hp: 10, speed: 3.0, score: 150, w: 22, h: 22, color: '#ff22aa', fireRate: 120 },
  heavy:   { hp: 120, speed: 0.5, score: 400, w: 44, h: 40, color: '#aa44ff', fireRate: 40 },
};

function spawnEnemy(type, x, y, path) {
  const t = ENEMY_TYPES[type];
  enemies.push({
    type, x, y,
    w: t.w, h: t.h,
    hp: t.hp + (stage-1)*10,
    maxHp: t.hp + (stage-1)*10,
    speed: t.speed,
    score: t.score,
    color: t.color,
    fireRate: t.fireRate,
    fireCooldown: Math.random()*t.fireRate,
    path: path || null,
    pathIdx: 0,
    vx: 0, vy: t.speed,
    angle: 0,
    dead: false,
  });
  stageEnemyCount++;
}

function drawEnemy(e) {
  const x = e.x, y = e.y;
  ctx.save();
  ctx.translate(x, y);

  if (e.type === 'fighter') {
    const g = ctx.createLinearGradient(-14,-14,14,14);
    g.addColorStop(0,'#ff6666'); g.addColorStop(1,'#880000');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,14); ctx.lineTo(14,-10); ctx.lineTo(6,-4);
    ctx.lineTo(0,-14); ctx.lineTo(-6,-4); ctx.lineTo(-14,-10);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffaaaa';
    ctx.beginPath(); ctx.ellipse(0,0,4,6,0,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'bomber') {
    ctx.fillStyle = '#cc5500';
    ctx.beginPath();
    ctx.moveTo(0,18); ctx.lineTo(20,-8); ctx.lineTo(14,-14);
    ctx.lineTo(0,-10); ctx.lineTo(-14,-14); ctx.lineTo(-20,-8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff8844';
    ctx.fillRect(-6,-8,12,14);
    // engine nacelles
    ctx.fillStyle='#884400';
    ctx.beginPath(); ctx.ellipse(-15,-2,5,3,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(15,-2,5,3,-0.3,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'fast') {
    ctx.fillStyle = '#ff22aa';
    ctx.beginPath();
    ctx.moveTo(0,11); ctx.lineTo(11,-4); ctx.lineTo(0,-11); ctx.lineTo(-11,-4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffaaee';
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'heavy') {
    const g = ctx.createLinearGradient(-22,-20,22,20);
    g.addColorStop(0,'#cc88ff'); g.addColorStop(1,'#440088');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,20); ctx.lineTo(22,-6); ctx.lineTo(18,-18);
    ctx.lineTo(0,-12); ctx.lineTo(-18,-18); ctx.lineTo(-22,-6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(200,150,255,0.5)';
    ctx.beginPath(); ctx.ellipse(0,-2,7,10,0,0,Math.PI*2); ctx.fill();
  }

  // HP bar
  if (e.hp < e.maxHp) {
    const bw = e.w;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(-bw/2, -e.h/2-8, bw, 4);
    ctx.fillStyle='#00ff88';
    ctx.fillRect(-bw/2, -e.h/2-8, bw*(e.hp/e.maxHp), 4);
  }

  ctx.restore();
}

// ─── Boss ────────────────────────────────────────────────────
function createBoss() {
  return {
    x: W/2, y: -80,
    w: 90, h: 80,
    hp: 800 + stage*200,
    maxHp: 800 + stage*200,
    phase: 1,
    vx: 1.5, vy: 0.8,
    targetY: 120,
    fireTimer: 0,
    angle: 0,
    pattern: 0,
    patternTimer: 0,
    arrived: false,
    dead: false,
    score: 5000 + stage*1000,
  };
}

function drawBoss(b) {
  const x = b.x, y = b.y;
  ctx.save();
  ctx.translate(x, y);

  // Glow aura
  const aura = ctx.createRadialGradient(0,0,20,0,0,70);
  const hp_ratio = b.hp / b.maxHp;
  const ac = hp_ratio > 0.5 ? `rgba(150,50,255,${0.3-hp_ratio*0.1})` : `rgba(255,50,50,${0.4})`;
  aura.addColorStop(0, ac);
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0,0,70,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = hp_ratio > 0.5 ? '#9933ff' : '#ff3333';
  ctx.beginPath();
  ctx.moveTo(0,-40); ctx.lineTo(45,-10); ctx.lineTo(40,20);
  ctx.lineTo(20,35); ctx.lineTo(0,30);
  ctx.lineTo(-20,35); ctx.lineTo(-40,20);
  ctx.lineTo(-45,-10); ctx.closePath();
  ctx.fill();

  // Center dome
  ctx.fillStyle = hp_ratio > 0.5 ? '#cc66ff' : '#ff6666';
  ctx.beginPath(); ctx.ellipse(0,-5,18,22,0,0,Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = 'rgba(255,200,0,0.9)';
  ctx.beginPath(); ctx.ellipse(0,-5,8,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0,-5,4,6,0,0,Math.PI*2); ctx.fill();

  // Wing cannons
  [-35,35].forEach(wx => {
    ctx.fillStyle = '#220055';
    ctx.fillRect(wx-6,-4,12,16);
    ctx.fillStyle = hp_ratio > 0.5 ? '#aa33ff' : '#ff4400';
    ctx.beginPath(); ctx.arc(wx, 14, 5, 0, Math.PI*2); ctx.fill();
  });

  // HP bar
  const bw = 120;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(-bw/2, -55, bw, 8);
  ctx.fillStyle = hp_ratio > 0.5 ? '#aa00ff' : '#ff2200';
  ctx.fillRect(-bw/2, -55, bw*(b.hp/b.maxHp), 8);
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1;
  ctx.strokeRect(-bw/2, -55, bw, 8);

  ctx.restore();
}

// ─── Particles ───────────────────────────────────────────────
function explode(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 4 + 1,
      life: Math.random() * 40 + 20,
      maxLife: 60,
      color: colors[Math.floor(Math.random()*colors.length)],
    });
  }
}

// ─── Powerups ────────────────────────────────────────────────
const POWERUP_TYPES = ['power','speed','bomb','shield','health'];
function spawnPowerup(x, y) {
  if (Math.random() > 0.35) return;
  const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerups.push({ x, y, type, vy: 1.5, angle: 0, life: 400 });
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  const colors = {
    power: ['#ffff00','#ff8800'],
    speed: ['#00ffff','#0088ff'],
    bomb: ['#ff4444','#ff0000'],
    shield: ['#00ff88','#008844'],
    health: ['#ff88ff','#ff44ff'],
  };
  const labels = { power:'P', speed:'S', bomb:'B', shield:'★', health:'+' };
  const [c1,c2] = colors[p.type];

  const g = ctx.createRadialGradient(0,0,4,0,0,14);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.fillStyle='white';
  ctx.font = `bold 10px 'Press Start 2P'`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(labels[p.type], 0, 1);
  ctx.restore();
}

function applyPowerup(type) {
  const p = player;
  switch(type) {
    case 'power':
      p.power = Math.min(5, p.power + 1);
      showMsg('POWER UP!', '#ffff00');
      break;
    case 'speed':
      p.speed = Math.min(9, p.speed + 1);
      showMsg('SPEED UP!', '#00ffff');
      break;
    case 'bomb':
      bombs = Math.min(5, bombs + 1);
      showMsg('BOMB GET!', '#ff4444');
      updateBombCount();
      break;
    case 'shield':
      p.invincible = Math.min(300, p.invincible + 200);
      showMsg('SHIELD!', '#00ff88');
      break;
    case 'health':
      p.hp = Math.min(p.maxHp, p.hp + 30);
      updateHealthBar();
      showMsg('REPAIR!', '#ff88ff');
      break;
  }
}

// ─── Messages ────────────────────────────────────────────────
const msgs = [];
function showMsg(text, color) {
  msgs.push({ text, color, x: W/2, y: H/2, life: 80, vy: -0.5 });
}

// ─── Enemy Spawn Waves ────────────────────────────────────────
const waves = [];
let waveTimer = 0;
let currentWave = 0;

function buildWaves() {
  const w = [];
  const totalWaves = 8 + stage * 2;

  for (let i = 0; i < totalWaves; i++) {
    const delay = i * (180 - stage*10);
    if (i % 4 === 0) {
      w.push({ delay, fn: () => {
        for (let j=0;j<3;j++) spawnEnemy('fighter', 80+j*100, -30);
      }});
    } else if (i % 4 === 1) {
      w.push({ delay, fn: () => {
        for (let j=0;j<2;j++) spawnEnemy('bomber', 140+j*140, -40);
      }});
    } else if (i % 4 === 2) {
      w.push({ delay, fn: () => {
        for (let j=0;j<5;j++) spawnEnemy('fast', 50+j*80, -20);
      }});
    } else {
      w.push({ delay, fn: () => {
        spawnEnemy('heavy', W/2-60, -50);
        spawnEnemy('heavy', W/2+60, -50);
      }});
    }
  }
  // Boss wave
  w.push({ delay: totalWaves*(180-stage*10)+200, fn: () => {
    bossActive = true;
    boss = createBoss();
    showMsg('BOSS!', '#ff0000');
  }});
  return w;
}

// ─── Bomb ─────────────────────────────────────────────────────
function useBomb() {
  if (bombs <= 0) return;
  bombs--;
  updateBombCount();
  player.bombBlast = 60;
  // Damage all enemies
  enemies.forEach(e => { e.hp -= 200; });
  if (bossActive && boss) boss.hp -= 400;
  explode(W/2, H/2, 80, ['#ff8800','#ffff00','#ff4400','#ffffff']);
  showMsg('BOMB!', '#ff8800');
}

// ─── Collision ───────────────────────────────────────────────
function rectHit(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 &&
         ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

// ─── HUD Update ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = String(score).padStart(6,'0');
  document.getElementById('highScoreVal').textContent = String(hiScore).padStart(6,'0');
  document.getElementById('stageVal').textContent = String(stage).padStart(2,'0');
  const l = ['✈','✈','✈'].slice(0,Math.max(0,lives)).join(' ');
  document.getElementById('livesVal').textContent = l || '---';
}

function updateHealthBar() {
  const pct = (player.hp / player.maxHp) * 100;
  document.getElementById('healthFill').style.width = pct + '%';
}

function updateBombCount() {
  document.getElementById('bombCount').textContent = '💣 ' + bombs;
}

// ─── Overlay ─────────────────────────────────────────────────
function showOverlay(type) {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  const title = ov.querySelector('.overlay-title');
  const sub = ov.querySelector('.overlay-sub');
  const btn = ov.querySelector('.btn');
  const scoreEl = ov.querySelector('.overlay-score');

  document.getElementById('overlayHi').textContent = String(hiScore).padStart(6,'0');

  if (type === 'menu') {
    title.innerHTML = 'SKY FORCE<br>1945';
    sub.textContent = '▶ PRESS SPACE OR CLICK TO START ◀';
    sub.classList.add('blink');
    btn.textContent = 'START GAME';
    btn.className = 'btn';
    scoreEl.style.display='block';
  } else if (type === 'gameover') {
    title.innerHTML = 'GAME OVER';
    title.style.color='#ff2244';
    title.style.textShadow='0 0 10px #ff2244, 0 0 20px #ff2244';
    sub.textContent = 'SCORE: ' + String(score).padStart(6,'0');
    sub.classList.remove('blink');
    btn.textContent = 'TRY AGAIN';
    btn.className = 'btn btn-red';
    scoreEl.style.display='none';
  } else if (type === 'stageclear') {
    title.innerHTML = `STAGE ${stage}<br>CLEAR!`;
    title.style.color='#00ff88';
    title.style.textShadow='0 0 10px #00ff88, 0 0 20px #00ff88';
    sub.textContent = '▶ PRESS SPACE TO CONTINUE ◀';
    sub.classList.add('blink');
    btn.textContent = 'NEXT STAGE';
    btn.className = 'btn';
    scoreEl.style.display='none';
  }
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  document.querySelector('.overlay-title').style.color='';
  document.querySelector('.overlay-title').style.textShadow='';
}

// ─── Game Init ───────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; stage = 1; bombs = 3;
  player = createPlayer();
  bullets = []; enemyBullets = []; enemies = [];
  particles = []; powerups = [];
  boss = null; bossActive = false;
  stageEnemyCount = 0; stageKillCount = 0;
  waveTimer = 0; currentWave = 0;
  waves.length = 0;
  const built = buildWaves();
  built.forEach(w => waves.push(w));
  frameCount = 0;
  updateHUD(); updateHealthBar(); updateBombCount();
  hideOverlay();
  state = 'playing';
}

function nextStage() {
  stage++;
  bombs = Math.min(5, bombs + 1);
  player.hp = player.maxHp;
  bullets = []; enemyBullets = []; enemies = [];
  particles = []; powerups = [];
  boss = null; bossActive = false;
  stageEnemyCount = 0; stageKillCount = 0;
  waveTimer = 0; currentWave = 0;
  waves.length = 0;
  const built = buildWaves();
  built.forEach(w => waves.push(w));
  updateHUD(); updateHealthBar(); updateBombCount();
  hideOverlay();
  state = 'playing';
}

function togglePause() {
  if (state === 'playing') state = 'paused';
  else if (state === 'paused') state = 'playing';
}

function playerDie() {
  explode(player.x, player.y, 60, ['#00ffff','#0088ff','#ffffff','#ffff00']);
  lives--;
  updateHUD();
  if (lives <= 0) {
    if (score > hiScore) { hiScore = score; localStorage.setItem('sf1945_hi', hiScore); }
    state = 'gameover';
    showOverlay('gameover');
  } else {
    player.hp = player.maxHp;
    player.x = W/2; player.y = H-80;
    player.invincible = 180;
    player.power = Math.max(1, player.power - 1);
    updateHealthBar();
  }
}

// ─── Update ──────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  });

  // Player movement
  const p = player;
  if (keys['ArrowLeft']  || keys['KeyA']) p.x -= p.speed;
  if (keys['ArrowRight'] || keys['KeyD']) p.x += p.speed;
  if (keys['ArrowUp']    || keys['KeyW']) p.y -= p.speed;
  if (keys['ArrowDown']  || keys['KeyS']) p.y += p.speed;
  p.x = Math.max(p.w/2, Math.min(W-p.w/2, p.x));
  p.y = Math.max(p.h/2, Math.min(H-p.h/2, p.y));

  // Trail
  p.trail.push({x:p.x, y:p.y+20});
  if (p.trail.length > 12) p.trail.shift();

  // Shoot
  p.fireCooldown--;
  if ((keys['Space'] || keys['KeyZ']) && p.fireCooldown <= 0) {
    shoot();
    p.fireCooldown = p.fireRate;
  }

  if (p.invincible > 0) p.invincible--;
  if (p.bombBlast > 0) p.bombBlast--;

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy;
    if (b.vx) b.x += b.vx;
    if (b.y < -20 || b.x < -20 || b.x > W+20) { bullets.splice(i,1); continue; }

    // Hit enemies
    let hit = false;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (rectHit(b.x,b.y,b.w,b.h, e.x,e.y,e.w,e.h)) {
        e.hp -= b.dmg;
        explode(b.x, b.y, 5, ['#ffff00','#ffffff']);
        bullets.splice(i,1); hit=true;
        if (e.hp <= 0 && !e.dead) {
          e.dead=true;
          score += e.score; stageKillCount++;
          explode(e.x,e.y,25,['#ff4400','#ff8800','#ffff00','#ffffff']);
          spawnPowerup(e.x, e.y);
          enemies.splice(j,1);
          updateHUD();
        }
        break;
      }
    }
    if (hit) continue;

    // Hit boss
    if (bossActive && boss && !boss.dead) {
      if (rectHit(b.x,b.y,b.w,b.h, boss.x,boss.y,boss.w,boss.h)) {
        boss.hp -= b.dmg;
        explode(b.x,b.y,4,['#aa44ff','#ffffff']);
        bullets.splice(i,1);
        if (boss.hp <= 0) {
          boss.dead=true; bossActive=false;
          score += boss.score;
          for(let k=0;k<120;k++) {
            setTimeout(()=>explode(boss.x+Math.random()*100-50,boss.y+Math.random()*80-40,8,['#ff4400','#ffaa00','#ff0000','#ffffff','#aa44ff']),k*30);
          }
          updateHUD();
          setTimeout(()=>{ state='stageclear'; showOverlay('stageclear'); }, 3000);
        }
      }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H+10 || b.x < -10 || b.x > W+10) { enemyBullets.splice(i,1); continue; }
    if (p.invincible <= 0 && rectHit(b.x,b.y,6,6, p.x,p.y,p.w*0.7,p.h*0.7)) {
      enemyBullets.splice(i,1);
      p.hp -= b.dmg;
      p.invincible = 30;
      explode(p.x,p.y,8,['#ff2244','#ffffff']);
      updateHealthBar();
      if (p.hp <= 0) playerDie();
    }
  }

  // Enemy update
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    // Movement
    if (e.path) {
      const pt = e.path[e.pathIdx];
      if (pt) {
        const dx = pt.x-e.x, dy = pt.y-e.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 4) { e.pathIdx++; }
        else { e.x += dx/dist*e.speed*1.5; e.y += dy/dist*e.speed*1.5; }
      } else { e.y += e.speed*0.5; }
    } else {
      e.y += e.speed;
      e.x += Math.sin(frameCount*0.03+i)*0.8;
    }

    if (e.y > H+60) { enemies.splice(i,1); continue; }

    // Enemy shoot
    e.fireCooldown--;
    if (e.fireCooldown <= 0) {
      e.fireCooldown = e.fireRate;
      const dx = p.x-e.x, dy = p.y-e.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      const spd = 3+stage*0.3;
      enemyBullets.push({ x:e.x, y:e.y+10, vx:dx/d*spd, vy:dy/d*spd, dmg:12, color:e.color });
    }

    // Hit player
    if (p.invincible <= 0 && rectHit(e.x,e.y,e.w*0.8,e.h*0.8, p.x,p.y,p.w*0.7,p.h*0.7)) {
      p.hp -= 30; p.invincible=60;
      explode(p.x,p.y,15,['#ff2244','#ff8800','#ffffff']);
      updateHealthBar();
      if (p.hp <= 0) playerDie();
    }
  }

  // Boss update
  if (bossActive && boss && !boss.dead) {
    const b = boss;
    if (!b.arrived) {
      b.y += 1.5;
      if (b.y >= b.targetY) b.arrived = true;
    } else {
      b.x += b.vx;
      if (b.x > W-60 || b.x < 60) b.vx *= -1;
      b.patternTimer++;

      // Phase 2
      if (b.hp < b.maxHp * 0.5) b.phase = 2;

      // Fire patterns
      b.fireTimer++;
      const fr = b.phase === 1 ? 35 : 20;
      if (b.fireTimer % fr === 0) {
        const count = b.phase === 1 ? 5 : 8;
        for (let i=0; i<count; i++) {
          const a = (Math.PI/count)*i + (b.patternTimer*0.02);
          const spd = b.phase===1 ? 3 : 4;
          enemyBullets.push({ x:b.x, y:b.y+20, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd+1, dmg:15, color:'#ff44ff' });
        }
      }
      // Aimed shot
      if (b.fireTimer % 60 === 0) {
        const dx=p.x-b.x, dy=p.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        const spd=5;
        enemyBullets.push({ x:b.x-35,y:b.y+30, vx:dx/d*spd, vy:dy/d*spd, dmg:20, color:'#ff0000' });
        enemyBullets.push({ x:b.x+35,y:b.y+30, vx:dx/d*spd, vy:dy/d*spd, dmg:20, color:'#ff0000' });
      }
    }

    // Hit player
    if (p.invincible<=0 && rectHit(b.x,b.y,b.w*0.8,b.h*0.8, p.x,p.y,p.w*0.7,p.h*0.7)) {
      p.hp-=40; p.invincible=60;
      updateHealthBar();
      if(p.hp<=0) playerDie();
    }
  }

  // Waves
  if (!bossActive) {
    waveTimer++;
    if (currentWave < waves.length && waveTimer >= waves[currentWave].delay) {
      waves[currentWave].fn();
      currentWave++;
    }
  }

  // Powerups
  for (let i = powerups.length-1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.vy;
    pu.angle += 0.04;
    pu.life--;
    if (pu.y > H+20 || pu.life<=0) { powerups.splice(i,1); continue; }
    if (rectHit(pu.x,pu.y,28,28, p.x,p.y,p.w,p.h)) {
      applyPowerup(pu.type);
      explode(pu.x,pu.y,12,['#ffffff','#ffff00','#00ffff']);
      powerups.splice(i,1);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.05;
    pt.life--;
    pt.r *= 0.97;
    if (pt.life <= 0 || pt.r < 0.3) particles.splice(i,1);
  }

  // Messages
  for (let i = msgs.length-1; i >= 0; i--) {
    const m = msgs[i];
    m.y += m.vy; m.life--;
    if (m.life<=0) msgs.splice(i,1);
  }
}

// ─── Draw ────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0,0,W,H);

  // Nebula
  const neb = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, 200);
  neb.addColorStop(0,'rgba(20,0,60,0.3)'); neb.addColorStop(1,'transparent');
  ctx.fillStyle=neb; ctx.fillRect(0,0,W,H);
  const neb2 = ctx.createRadialGradient(W*0.7, H*0.7, 0, W*0.7, H*0.7, 180);
  neb2.addColorStop(0,'rgba(0,30,60,0.3)'); neb2.addColorStop(1,'transparent');
  ctx.fillStyle=neb2; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.4 + Math.sin(frameCount*0.02+s.brightness*10)*0.3;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bomb blast
  if (player && player.bombBlast > 0) {
    const alpha = player.bombBlast/60*0.4;
    ctx.fillStyle=`rgba(255,140,0,${alpha})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(255,255,200,${alpha*0.5})`;
    ctx.fillRect(0,0,W,H);
  }

  // Particles
  particles.forEach(pt => {
    ctx.globalAlpha = pt.life/pt.maxLife;
    ctx.fillStyle = pt.color;
    ctx.shadowColor = pt.color;
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Player trail
  if (player) {
    player.trail.forEach((t,i) => {
      ctx.globalAlpha = (i/player.trail.length)*0.25;
      ctx.fillStyle='#0088ff';
      ctx.beginPath(); ctx.arc(t.x,t.y,4*(i/player.trail.length),0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  // Powerups
  powerups.forEach(pu => {
    ctx.globalAlpha = pu.life < 80 ? (pu.life/80) : 1;
    drawPowerup(pu);
    ctx.globalAlpha=1;
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Boss
  if (bossActive && boss && !boss.dead) drawBoss(boss);

  // Player bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y-b.h);
    g.addColorStop(0, b.color);
    g.addColorStop(1, 'rgba(255,255,255,0.8)');
    ctx.fillStyle = g;
    ctx.fillRect(b.x-b.w/2, b.y-b.h, b.w, b.h);
    ctx.restore();
  });

  // Player
  if (player && state === 'playing') drawPlayer(player);

  // Messages
  msgs.forEach(m => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, m.life/20);
    ctx.fillStyle = m.color;
    ctx.shadowColor = m.color;
    ctx.shadowBlur = 20;
    ctx.font = "bold 14px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.fillText(m.text, m.x, m.y);
    ctx.restore();
  });

  // Pause overlay
  if (state === 'paused') {
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ffff';
    ctx.shadowColor='#00ffff';
    ctx.shadowBlur=20;
    ctx.font="bold 18px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.fillText('PAUSED', W/2, H/2-10);
    ctx.font="8px 'Press Start 2P'";
    ctx.fillText('P - RESUME', W/2, H/2+20);
    ctx.shadowBlur=0;
  }

  // Boss health label
  if (bossActive && boss && !boss.dead) {
    ctx.fillStyle='rgba(150,50,255,0.8)';
    ctx.font="6px 'Press Start 2P'";
    ctx.textAlign='center';
    ctx.fillText('BOSS', boss.x, boss.y-60);
  }
}

// ─── Loop ────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── Events ──────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  if (state === 'menu') startGame();
  else if (state === 'gameover') { state='menu'; showOverlay('menu'); setTimeout(startGame,50); }
  else if (state === 'stageclear') nextStage();
});

canvas.addEventListener('click', () => {
  if (state === 'menu') startGame();
});

// Touch controls
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  keys['Space']=true;
  if (state==='menu') startGame();
},{passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W/rect.width;
  const scaleY = H/rect.height;
  if (player) {
    player.x = (e.touches[0].clientX-rect.left)*scaleX;
    player.y = (e.touches[0].clientY-rect.top)*scaleY;
  }
},{passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys['Space']=false;
},{passive:false});

// Auto-fire on touch
setInterval(()=>{ if(state==='playing' && player) { shoot(); } }, 150);

// ─── Init ────────────────────────────────────────────────────
initStars();
document.getElementById('overlayHi').textContent = String(hiScore).padStart(6,'0');
document.getElementById('highScoreVal').textContent = String(hiScore).padStart(6,'0');
loop();
</script>
</body>
</html>
